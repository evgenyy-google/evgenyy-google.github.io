- start: 120
  duration: 13
  type: caption
  text: Now let's examine the 4-tier model. Framing our thinking from product spec
    to implementation, with coding agents we must decide our trade-offs between speed
    and control.
- start: 134
  duration: 13
  type: caption
  text: Because models naturally jump across levels while making decisions, stay aware
    of the active level to steer effectively.
- start: 147
  duration: 14
  type: caption
  text: 'Use two-way dialogue: TELL to lock constraints, and ASK to leverage model
    expertise for new ideas and blind spots.'
- start: 160
  duration: 10
  type: caption
  text: With implementation finished, we can see the agent launching a subagent to
    locally test the live app.
