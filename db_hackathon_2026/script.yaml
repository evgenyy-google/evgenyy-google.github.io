- start: 75
  duration: 10
  type: caption
  text: 'Now moving to architecture: here is the general structure of coding agent
    harnesses.'
- start: 80
  duration: 10
  type: caption
  text: While all Antigravity surfaces share this harness, modern tools like Claude
    or Codex follow similar core patterns.
- start: 88
  duration: 7
  type: caption
  text: At the core, an autonomous ReAct loop drives execution, reasoning, and iterative
    planning.
- start: 95
  duration: 8
  type: caption
  text: Context engineering enables user-defined rules, skill loading, sub-agent dispatching,
    and automatic context compaction.
- start: 103
  duration: 7
  type: caption
  text: The tooling layer provides file system access, shell execution, local MCP
    servers, and external API integrations.
- start: 111
  duration: 8
  type: caption
  text: Everything is ultimately powered by latest Gemini models, driving reasoning
    and tool execution at every step.
